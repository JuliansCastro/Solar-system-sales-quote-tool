name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  deprecated-import-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate deprecated imports are not used
        run: |
          python scripts/validate_no_deprecated_imports.py

  lint:
    runs-on: ubuntu-latest
    needs: [deprecated-import-gate]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r solar_app/requirements.txt
      - name: Ruff
        run: |
          cd solar_app
          ruff check .
      - name: Black check
        run: |
          cd solar_app
          black --check .
      - name: Isort check
        run: |
          cd solar_app
          isort --check-only .

  test:
    runs-on: ubuntu-latest
    needs: [deprecated-import-gate]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r solar_app/requirements.txt
          pip install pytest-cov
      - name: Django checks
        run: |
          cd solar_app
          python manage.py check
          python manage.py migrate --plan
      - name: Run tests
        run: |
          cd solar_app
          python -m pytest -q --cov=core --cov-report=term-missing --cov-fail-under=70

  integration-checks:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r solar_app/requirements.txt
      - name: Run scheduler and command integration checks
        run: |
          cd solar_app
          python manage.py migrate --noinput
          python manage.py load_equipment_catalog
          python manage.py setup_demo_data
          python manage.py backup_db --label ci --skip-purge
          python manage.py manage_scheduler status
          python manage.py check

  build-image:
    runs-on: ubuntu-latest
    needs: [lint, test, integration-checks]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t solar-quote:${{ github.sha }} .

  staging-deploy:
    runs-on: ubuntu-latest
    needs: [build-image]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy placeholder
        run: echo "Implementar despliegue a staging (canary o blue-green)"
