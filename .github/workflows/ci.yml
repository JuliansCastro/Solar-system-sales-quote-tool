name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r solar_app/requirements.txt
      - name: Ruff
        run: |
          cd solar_app
          ruff check .
      - name: Black check
        run: |
          cd solar_app
          black --check .
      - name: Isort check
        run: |
          cd solar_app
          isort --check-only .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r solar_app/requirements.txt
      - name: Django checks
        run: |
          cd solar_app
          python manage.py check
          python manage.py migrate --plan
      - name: Run tests
        run: |
          cd solar_app
          python -m pytest -q

  build-image:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t solar-quote:${{ github.sha }} .

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [build-image]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy placeholder
        run: echo "Implementar despliegue a staging (canary o blue-green)"
